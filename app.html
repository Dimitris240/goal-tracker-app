<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">

  <!-- Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="/goal-tracker-app/manifest.json">

  <!-- Theme -->
  <meta name="theme-color" content="#0f172a">

  <!-- iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Progress</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<div class="container">

  <h1>📈 Η Πρόοδός σου</h1>

  <h2 id="moneyDisplay">💰 0€</h2>

  <input type="number" id="changeAmount" placeholder="+ ή - ποσό">
  <button onclick="updateProgress()">OK</button>

  <div class="bar-container">
    <div id="bar"></div>
    <div id="character">🚶</div>
    <div class="finish">🏁</div>
  </div>
</div>

<div class="reset-container">
  <button class="reset-btn" onclick="resetApp()">🔴 Reset</button>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
